# migration-job.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: alembic-migration
  namespace: banking-operations
spec:
  template:
    spec:
      containers:
      - name: alembic-migration
        image: ivanazare/async-api-fast-dio-luizalabs:latest
        command: ["alembic", "upgrade", "head"]
        env:
        - name: DB_HOST
          value: "postgres-service"
        - name: DB_USER
          value: "banking_operations"
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_PASSWORD
        - name: DB_NAME
          value: "bank_db"
        - name: DB_PORT
          value: "5432"
      restartPolicy: Never
  backoffLimit: 3